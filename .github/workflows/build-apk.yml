name: ساخت فایل APK

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کد از مخزن
        uses: actions/checkout@v4

      - name: نصب Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: نصب Java (برای Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: نصب پکیج‌های پروژه
        run: npm install

      - name: افزودن پلتفرم اندروید به Capacitor (در صورت نبود)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: رجیستر کردن پلاگین GoogleAuth در MainActivity
        run: |
          MAIN_ACTIVITY=$(find android -name "MainActivity.java")
          echo "مسیر پیدا شده: $MAIN_ACTIVITY"
          PACKAGE_LINE=$(grep "^package " "$MAIN_ACTIVITY")
          cat > "$MAIN_ACTIVITY" << JAVAEOF
          $PACKAGE_LINE

          import com.getcapacitor.BridgeActivity;
          import com.codetrixstudio.capacitor.GoogleAuth.GoogleAuth;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(android.os.Bundle savedInstanceState) {
                  registerPlugin(GoogleAuth.class);
                  super.onCreate(savedInstanceState);
              }
          }
          JAVAEOF
          cat "$MAIN_ACTIVITY"

      - name: همگام‌سازی فایل‌های وب و پلاگین‌ها با پروژه اندروید
        run: npx cap sync android

      - name: مجوز اجرا به gradlew
        run: chmod +x ./android/gradlew

      - name: ساخت APK (نسخه دیباگ)
        run: cd android && ./gradlew assembleDebug

      - name: نمایش SHA-1 fingerprint (برای تنظیم Google OAuth)
        shell: bash --noprofile --norc -o pipefail {0}
        run: |
          set +e
          echo "=== مسیر فایل keystore ==="
          KEYSTORE_PATH="/home/runner/.config/.android/debug.keystore"
          echo "$KEYSTORE_PATH"
          echo "=== محتوای کامل keytool ==="
          keytool -list -v -keystore "$KEYSTORE_PATH" -alias androiddebugkey -storepass android -keypass android
          echo "=== پایان ==="
          exit 0

      - name: بارگذاری فایل APK به عنوان خروجی
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
