<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1c1a17" />
<title>کتابخوان من</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- صفحه ورود -->
<div id="screen-login" class="screen active">
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-mark">کتاب</div>
      <h1>کتابخوان من</h1>
      <p class="tagline">کتابخانه شخصی شما، همیشه همراه شما</p>
    </div>

    <button id="btn-google-login" class="btn-primary">
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.85 2.08-1.81 2.72v2.26h2.92c1.7-1.57 2.69-3.88 2.69-6.62z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.55-1.85.87-3.04.87-2.34 0-4.32-1.58-5.03-3.71H.96v2.33C2.44 15.98 5.48 18 9 18z"/>
        <path fill="#FBBC05" d="M3.97 10.72c-.18-.55-.28-1.13-.28-1.72s.1-1.17.28-1.72V4.95H.96A8.997 8.997 0 0 0 0 9c0 1.45.35 2.83.96 4.05l3.01-2.33z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/>
      </svg>
      ورود با گوگل
    </button>

    <p class="login-note">برای ذخیره کتاب‌ها، هایلایت‌ها و یادداشت‌ها در گوگل درایو شما</p>
  </div>
</div>

<!-- صفحه کتابخانه -->
<div id="screen-library" class="screen">
  <header class="topbar">
    <button id="btn-account" class="icon-btn" aria-label="حساب کاربری">
      <span class="avatar" id="user-avatar">؟</span>
    </button>
    <h2>کتابخانه من</h2>
    <button id="btn-add-book" class="icon-btn" aria-label="افزودن کتاب">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </header>

  <div id="sync-status" class="sync-status"></div>

  <div id="library-empty" class="empty-state">
    <div class="empty-icon">📖</div>
    <h3>کتابخانه شما خالی است</h3>
    <p>برای شروع، یک فایل PDF یا EPUB اضافه کنید</p>
    <button id="btn-add-book-empty" class="btn-secondary">افزودن کتاب</button>
  </div>

  <div id="library-grid" class="library-grid"></div>

  <input type="file" id="file-input" accept=".pdf,.epub,.txt" style="display:none" />
</div>

<!-- صفحه افزودن کتاب / پردازش -->
<div id="screen-processing" class="screen">
  <header class="topbar">
    <button id="btn-back-from-processing" class="icon-btn" aria-label="بازگشت">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <h2>افزودن کتاب</h2>
    <span style="width:40px"></span>
  </header>

  <div class="processing-wrap" id="processing-wrap">
    <p class="processing-hint">فایل PDF یا EPUB خود را انتخاب کنید</p>
  </div>
</div>

<!-- صفحه خوانش کتاب -->
<div id="screen-reader" class="screen">
  <header class="topbar reader-topbar">
    <button id="btn-back-from-reader" class="icon-btn" aria-label="بازگشت">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <h2 id="reader-title">عنوان کتاب</h2>
    <button id="btn-reader-menu" class="icon-btn" aria-label="تنظیمات">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
    </button>
  </header>

  <div id="reader-content" class="reader-content"></div>
</div>

<script src="capacitor.js"></script>
<script src="js/auth.js"></script>
<script src="js/storage.js"></script>
<script src="js/library.js"></script>
<script src="js/reader.js"></script>
<script src="js/app.js"></script>
</body>
</html>
